name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      - name: Rename binary
        run: |
          cp .build/release/drive-rescue drive-rescue-macos-arm64
          file drive-rescue-macos-arm64

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" drive-rescue-macos-arm64
