name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Embed version
        run: sed -i '' "s/let version = \"dev\"/let version = \"${{ github.event.release.tag_name }}\"/" Sources/main.swift

      - name: Build
        run: swift build -c release

      - name: Package
        run: |
          cp .build/release/drive-rescue drive-rescue
          zip "drive-rescue-macos-arm64-${{ github.event.release.tag_name }}.zip" drive-rescue

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "drive-rescue-macos-arm64-${{ github.event.release.tag_name }}.zip"
